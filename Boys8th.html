<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boys 8th Rankings</title>
    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-text: #000000;
            --ios-secondary: #8E8E93;
            --ios-border: #C6C6C8;
            --ios-green: #34C759;
            --ios-red: #FF3B30;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            margin: 0; padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        header { padding: 20px 16px 10px 16px; background: var(--ios-bg); position: sticky; top: 0; z-index: 10; }
        h1 { font-size: 22px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        .container { padding: 0 16px 40px 16px; }
        .table-card { background: var(--ios-card); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { color: var(--ios-secondary); font-size: 10px; text-transform: uppercase; text-align: left; padding: 12px 8px; border-bottom: 0.5px solid var(--ios-border); }
        td { padding: 12px 8px; border-bottom: 0.5px solid var(--ios-border); }
        tr:last-child td { border-bottom: none; }
        .rk { width: 20px; color: var(--ios-secondary); text-align: center; }
        .team { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
        .wl { width: 30px; text-align: center; }
        .num { width: 30px; text-align: center; font-variant-numeric: tabular-nums; }
        .diff { width: 40px; text-align: right; padding-right: 12px; font-weight: 700; font-variant-numeric: tabular-nums; }
        .pos { color: var(--ios-green); }
        .neg { color: var(--ios-red); }
    </style>
</head>
<body>
    <header><h1>Boys 8th Rankings</h1></header>
    <div class="container">
        <div class="table-card">
            <table>
                <thead>
                    <tr><th class="rk">#</th><th class="team">TEAM</th><th class="wl">W-L</th><th class="num">PF</th><th class="num">PA</th><th class="diff">+/-</th></tr>
                </thead>
                <tbody>
                    <tr><td class="rk">1</td><td class="team">Kaysville Red</td><td class="wl">2-0</td><td class="num">139</td><td class="num">47</td><td class="diff pos">+92</td></tr>
                    <tr><td class="rk">2</td><td class="team">Farmington</td><td class="wl">2-0</td><td class="num">140</td><td class="num">81</td><td class="diff pos">+59</td></tr>
                    <tr><td class="rk">3</td><td class="team">Centerville Blue</td><td class="wl">2-0</td><td class="num">100</td><td class="num">65</td><td class="diff pos">+35</td></tr>
                    <tr><td class="rk">4</td><td class="team">Centennial</td><td class="wl">2-0</td><td class="num">101</td><td class="num">77</td><td class="diff pos">+24</td></tr>
                    <tr><td class="rk">5</td><td class="team">Mueller Park</td><td class="wl">2-0</td><td class="num">78</td><td class="num">75</td><td class="diff pos">+3</td></tr>
                    <tr><td class="rk">6</td><td class="team">Shoreline</td><td class="wl">1-1</td><td class="num">108</td><td class="num">85</td><td class="diff pos">+23</td></tr>
                    <tr><td class="rk">7</td><td class="team">Horizon White</td><td class="wl">1-1</td><td class="num">107</td><td class="num">93</td><td class="diff pos">+14</td></tr>
                    <tr><td class="rk">8</td><td class="team">Cent. Thunder</td><td class="wl">1-1</td><td class="num">86</td><td class="num">79</td><td class="diff pos">+7</td></tr>
                    <tr><td class="rk">9</td><td class="team">Centerville Gold</td><td class="wl">1-1</td><td class="num">85</td><td class="num">80</td><td class="diff pos">+5</td></tr>
                    <tr><td class="rk">10</td><td class="team">Legacy Blue</td><td class="wl">1-1</td><td class="num">88</td><td class="num">87</td><td class="diff pos">+1</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
