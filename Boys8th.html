<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boys 8th Rankings</title>
    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-text: #000000;
            --ios-secondary: #8E8E93;
            --ios-border: #C6C6C8;
            --ios-green: #34C759;
            --ios-red: #FF3B30;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            margin: 0; padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        header { padding: 20px 16px 10px 16px; }
        h1 { font-size: 22px; font-weight: 700; margin: 0; }
        .container { padding: 0 16px 40px 16px; }
        .table-card { background: var(--ios-card); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { color: var(--ios-secondary); font-size: 10px; text-transform: uppercase; text-align: left; padding: 12px 8px; border-bottom: 0.5px solid var(--ios-border); }
        td { padding: 14px 8px; border-bottom: 0.5px solid var(--ios-border); }
        .rk { width: 25px; color: var(--ios-secondary); text-align: center; }
        .team { font-weight: 600; }
        .wl { width: 35px; text-align: center; }
        .num { width: 35px; text-align: center; font-variant-numeric: tabular-nums; }
        .diff { width: 45px; text-align: right; padding-right: 12px; font-weight: 600; }
        .pos { color: var(--ios-green); }
        .neg { color: var(--ios-red); }
    </style>
</head>
